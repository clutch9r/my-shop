<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 12px;
        }
        h2 { margin-bottom: 12px; }
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
            padding-bottom: 4px;
        }
        .cat-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #2ea44f;
            background: white;
            color: #2ea44f;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }
        .cat-btn.active {
            background: #2ea44f;
            color: white;
        }
        .product {
            border: 1px solid #eee;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .product img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .product-info { padding: 12px; }
        .product-info h3 { margin-bottom: 4px; }
        .product-info p { color: gray; font-size: 13px; margin-bottom: 8px; }
        .price { font-size: 18px; font-weight: bold; color: #2ea44f; }
        .order-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #2ea44f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        .loading { text-align: center; padding: 40px; color: gray; }
    </style>
</head>
<body>
    <h2>🛍️ Наши товары</h2>
    <div class="categories" id="categories"></div>
    <div id="products"><div class="loading">Загрузка...</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SERVER = "https://my-shop-tmnf.onrender.com";

        let allProducts = [];
        let activeCategory = null;

        async function loadCategories() {
            const res = await fetch(`${SERVER}/categories`);
            const cats = await res.json();
            const div = document.getElementById('categories');
            div.innerHTML = `<button class="cat-btn active" onclick="filterProducts(null, this)">Все</button>`;
            cats.forEach(cat => {
                div.innerHTML += `<button class="cat-btn" onclick="filterProducts(${cat.id}, this)">${cat.name}</button>`;
            });
        }

        async function loadProducts(catId = null) {
            const url = catId ? `${SERVER}/products/${catId}` : `${SERVER}/products`;
            const res = await fetch(url);
            allProducts = await res.json();
            renderProducts(allProducts);
        }

        function renderProducts(products) {
            const div = document.getElementById('products');
            if (products.length === 0) {
                div.innerHTML = '<div class="loading">Товары не найдены</div>';
                return;
            }
            div.innerHTML = products.map(p => `
                <div class="product">
                    <img src="https://my-shop-tmnf.onrender.com/photo/${p.photo_id}"
                         onerror="this.src='https://via.placeholder.com/400x180'"
                         alt="${p.name}">
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.description}</p>
                        <div class="price">${p.price}</div>
                        <button class="order-btn" onclick='order(${JSON.stringify(p)})'>Заказать</button>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(catId, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = catId;
            loadProducts(catId);
        }

        function order(product) {
            tg.sendData(JSON.stringify({
                product: product.name,
                price: product.price
            }));
        }

        loadCategories();
        loadProducts();
    </script>
</body>
</html>
